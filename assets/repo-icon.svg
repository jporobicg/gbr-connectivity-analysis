<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">GBR connectivity analysis</title>
  <desc id="desc">Stylized reef network: nodes linked by pathways over ocean gradient.</desc>
  <defs>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#164e63"/>
    </linearGradient>
    <linearGradient id="coral" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#ocean)"/>
  <!-- connectivity graph -->
  <g fill="none" stroke="#99f6e4" stroke-width="2" stroke-linecap="round" opacity="0.9">
    <path d="M28 44 Q64 28 100 44"/>
    <path d="M28 44 L44 88"/>
    <path d="M100 44 L84 88"/>
    <path d="M44 88 Q64 72 84 88"/>
    <path d="M64 36 L64 96"/>
  </g>
  <g>
    <circle cx="28" cy="44" r="7" fill="url(#coral)" stroke="#ccfbf1" stroke-width="1.5"/>
    <circle cx="100" cy="44" r="7" fill="url(#coral)" stroke="#ccfbf1" stroke-width="1.5"/>
    <circle cx="44" cy="88" r="7" fill="url(#coral)" stroke="#ccfbf1" stroke-width="1.5"/>
    <circle cx="84" cy="88" r="7" fill="url(#coral)" stroke="#ccfbf1" stroke-width="1.5"/>
    <circle cx="64" cy="36" r="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="2"/>
    <circle cx="64" cy="96" r="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="2"/>
  </g>
  <!-- subtle wave / reef hint -->
  <path d="M8 118 Q32 108 64 118 T120 118" fill="none" stroke="#134e4a" stroke-width="3" opacity="0.45"/>
</svg>
